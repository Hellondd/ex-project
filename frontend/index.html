<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeBooking | Внутренний сервис</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Система бронирования ресурсов</h1>
            <p class="subtitle">Внутренний прикладной сервис компании</p>
        </header>

        <main class="layout">
            <section class="inventory">
                <h2><span class="icon">📍</span> Доступные места</h2>
                <div id="workspace-list">
                    <p class="loading">Загрузка данных с сервера...</p>
                </div>
            </section>

            <section class="booking-panel">
                <div class="card">
                    <h2><span class="icon">📅</span> Новая бронь</h2>
                    <div class="form-group">
                        <label for="wsId">ID ресурса</label>
                        <input type="number" id="wsId" placeholder="Введите ID из списка слева" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="bDate">Дата</label>
                        <input type="date" id="bDate" required>
                    </div>

                    <div class="time-row">
                        <div class="form-group">
                            <label for="bStart">Начало</label>
                            <input type="time" id="bStart" required>
                        </div>
                        <div class="form-group">
                            <label for="bEnd">Конец</label>
                            <input type="time" id="bEnd" required>
                        </div>
                    </div>

                    <button id="submitBtn" class="primary-btn">Подтвердить бронирование</button>
                    
                    <div id="msg" class="status-msg"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
